# =============================================================================
# Samvad — Docker Compose
# Three services: model server, backend API, frontend
# Data volumes: runtime data persists across restarts
# =============================================================================

version: "3.9"

services:

  # ── Arthvidya model server (llama-cpp-python) ───────────────────────────────
  model-server:
    build:
      context: .
      dockerfile: infra/docker/model_server.Dockerfile
    container_name: samvad-model
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro              # model files — read-only
    environment:
      - LLAMA_MODEL_PATH=${LLAMA_MODEL_PATH}
      - LLAMA_CTX_SIZE=${LLAMA_CTX_SIZE:-32768}
      - LLAMA_PARALLEL_SLOTS=${LLAMA_PARALLEL_SLOTS:-4}
      - LLAMA_GPU_LAYERS=${LLAMA_GPU_LAYERS:-99}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samvad-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./runtime:/runtime              # SQLite, ChromaDB, uploads — persisted
      - ./data/corpus:/data/corpus:ro   # corpus PDFs — read-only
      - ./models:/models:ro             # embedding + reranker models
      - ./config:/config:ro             # samvad.yaml
    environment:
      - SAMVAD_ENV=${SAMVAD_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - SQLITE_PATH=/runtime/sqlite/samvad.db
      - CHROMADB_PATH=/runtime/chromadb
      - LLAMA_SERVER_HOST=model-server
      - LLAMA_SERVER_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      model-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Angular frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: samvad-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3

# ── Named volumes for runtime persistence ─────────────────────────────────────
# Note: using bind mounts (./runtime) instead of named volumes
# so data is directly accessible on the host for debugging and backup.

networks:
  default:
    name: samvad-network
