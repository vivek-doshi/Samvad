# =============================================================================
# Samvad Configuration
# All tunable parameters. Sensitive values come from .env, not here.
# =============================================================================

model:
  context_window: 32768
  max_tokens_generation: 2048
  temperature: 0.3          # Low for factual finance responses
  top_p: 0.95
  top_k: 20
  repeat_penalty: 1.1
  timeout_seconds: 120

token_budget:
  total: 32768
  system_prompt_max: 500
  session_summary_max: 350
  history_verbatim_turns: 2
  generation_reserved: 2048
  # Retrieval gets: total - system - summary - history - query - generation

rag:
  top_k_retrieval: 10       # candidates from each of vector + BM25
  top_k_rerank: 5           # final chunks after reranking
  rrf_k: 60                 # Reciprocal Rank Fusion constant
  leaf_chunk_size: 400      # tokens — for IT Act / regulatory docs
  parent_chunk_size: 1800   # tokens — returned to model
  user_doc_chunk_size: 512  # tokens — user uploaded documents
  user_doc_overlap: 64      # tokens overlap between user doc chunks

embedding:
  model: bge-small-en-v1.5
  dimensions: 384
  batch_size: 32

reranker:
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  device: cpu               # Runs on CPU to leave GPU for Arthvidya

session:
  summarise_after_turns: 6  # compress oldest turns after this many turns
  max_active_sessions: 1    # per user — enforced at DB level too

security:
  max_input_chars: 2000
  max_upload_mb: 50
  injection_threshold: 2    # flag session after this many injection attempts

corpus:
  collections:
    income_tax_act:
      name: Income Tax Act 2025
      type: act
      regulator: CBDT
      chroma_leaf: it_act_2025_leaves
      chroma_parent: it_act_2025_parents
    sebi:
      name: SEBI Regulations
      type: regulation
      regulator: SEBI
      chroma_leaf: sebi_regulations_leaves
      chroma_parent: sebi_regulations_parents
    fema:
      name: FEMA 1999
      type: regulation
      regulator: RBI
      chroma_leaf: fema_leaves
      chroma_parent: fema_parents
    dtaa:
      name: DTAA Treaties
      type: dtaa
      regulator: CBDT
      chroma_leaf: dtaa_leaves
      chroma_parent: dtaa_parents
    companies_act:
      name: Companies Act 2013
      type: act
      regulator: MCA
      chroma_leaf: companies_act_leaves
      chroma_parent: companies_act_parents

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: /runtime/logs/samvad.log
  max_bytes: 10485760       # 10MB
  backup_count: 5
