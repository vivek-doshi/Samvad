# nginx proxy configuration — Angular frontend to backend API
# Note 1: Nginx acts as a reverse proxy in Samvad's production setup:
# - Static Angular files (HTML/CSS/JS) are served directly from /usr/share/nginx/html
# - API requests (/api/*) are forwarded to the FastAPI backend at backend:8000
# - This single-origin architecture eliminates CORS issues in production
#   (frontend and API share the same domain/port from the browser's perspective)
#
# Note 2: In Docker Compose, the service names (e.g. 'backend') are used as
# hostnames. 'proxy_pass http://backend:8000' forwards requests to the FastAPI
# container, which is accessible on port 8000 within the Docker network.
#
# Note 3: Typical production nginx.conf:
#
# server {
#     listen 80;
#     server_name _;
#     root /usr/share/nginx/html;
#     index index.html;
#
#     # Note 4: try_files implements the Angular router's "HTML5 push state" mode.
#     # When the user refreshes on /chat, Nginx looks for a 'chat' file, finds none,
#     # and serves index.html instead. Angular's router then handles the /chat route
#     # client-side. Without this, refreshing a deep link returns 404.
#     location / {
#         try_files $uri $uri/ /index.html;
#     }
#
#     # Note 5: All requests starting with /api/ are proxied to FastAPI.
#     # proxy_set_header lines forward the original request headers to FastAPI
#     # so it can read the client's real IP and protocol for logging/security.
#     location /api/ {
#         proxy_pass http://backend:8000;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         # Note 6: These headers are required for SSE (Server-Sent Events) streaming.
#         # Without them, Nginx buffers the entire response before forwarding, breaking
#         # the real-time token streaming for chat responses.
#         proxy_buffering off;
#         proxy_cache off;
#     }
# }
#
